- name: Configure the jenkins-PersistentVolumeClaim
  kubernetes.core.k8s:
    kind: PersistentVolumeClaim
    api_version: v1
    name: jenkins
    namespace: "{{ adrianjuhl__jenkins_on_openshift4__openshift_namespace_jenkins }}"
    state: present
    resource_definition:
#      apiVersion: v1
#      kind: PersistentVolumeClaim
      metadata:
        annotations:
          uoa_managed_resource: Do not edit this resource in OpenShift. This resource is maintained in code and managed by an automated process. Edits made in OpenShift will be overwritten.
#          openshift.io/generated-by: OpenShiftNewApp
#        creationTimestamp: null
        labels:
          app: jenkins-persistent
#          template: jenkins-persistent-template
#        name: jenkins
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ adrianjuhl__jenkins_on_openshift4__jenkins_pvc_storage_size }}"
        storageClassName: "{{ adrianjuhl__jenkins_on_openshift4__jenkins_pvc_storage_class_name }}"
#      status: {}
  when: jenkins_pvc_result.resources | length == 0


