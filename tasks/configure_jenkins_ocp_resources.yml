- name: Configure the jenkins-Route
  kubernetes.core.k8s:
    name: jenkins
    kind: Route
    api_version: route.openshift.io/v1
    namespace: "{{ adrianjuhl__jenkins_on_openshift4__openshift_namespace_jenkins }}"
    state: present
    resource_definition:
#      apiVersion: route.openshift.io/v1
#      kind: Route
      metadata:
        annotations:
          uoa_managed_resource: Do not edit this resource in OpenShift. This resource is maintained in code and managed by an automated process. Edits made in OpenShift will be overwritten.
          haproxy.router.openshift.io/timeout: 4m
#          openshift.io/generated-by: OpenShiftNewApp
          template.openshift.io/expose-uri: http://{.spec.host}{.spec.path}
#        creationTimestamp: null
        labels:
          app: jenkins-persistent
#          template: jenkins-persistent-template
#        name: jenkins
      spec:
        tls:
          insecureEdgeTerminationPolicy: Redirect
          termination: edge
        to:
          kind: Service
          name: jenkins
          weight: null
#      status: {}




