        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ adrianjuhl__jenkins_on_openshift4__jenkins_pvc_storage_size }}"
        storageClassName: "{{ adrianjuhl__jenkins_on_openshift4__jenkins_pvc_storage_class_name }}"
