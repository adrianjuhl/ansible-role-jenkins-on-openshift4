- name: Configure the jenkins-agent-maven-dotm2-settings-xml-Secret
  kubernetes.core.k8s:
    kind: Secret
    api_version: v1
    name: jenkins-agent-maven-dotm2-settings-xml
    namespace: "{{ adrianjuhl__jenkins_on_openshift4__openshift_namespace_jenkins }}"
    state: present
    resource_definition:
      metadata:
        annotations:
          uoa_managed_resource: Do not edit this resource in OpenShift. This resource is maintained in code and managed by an automated process. Edits made in OpenShift will be overwritten.
      stringData:
        secrettext: |-
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              {{ adrianjuhl__jenkins_on_openshift4__maven_settings_server1 }}
              {{ adrianjuhl__jenkins_on_openshift4__maven_settings_server2 }}
              {{ adrianjuhl__jenkins_on_openshift4__maven_settings_server3 }}
            </servers>
            <mirrors>
              {{ adrianjuhl__jenkins_on_openshift4__maven_settings_mirror }}
            </mirrors>
          </settings>
      type: Opaque







- name: Configure the jenkins-DeploymentConfig
  ansible.builtin.shell:
    cmd: "yq eval '.spec.template.spec.containers[] |= select(.name==\"jenkins\").env[] |= select(.name==\"INSTALL_PLUGINS\") |= .value=\"{{ adrianjuhl__jenkins_on_openshift4__jenkins_install_plugins }}\" | .spec.triggers[] |= select(.type==\"ImageChange\") |= .imageChangeParams.from.name=\"{{ adrianjuhl__jenkins_on_openshift4__jenkins_source_imagestreamtag_name }}\" | .spec.triggers[] |= select(.type==\"ImageChange\") |= .imageChangeParams.from.namespace=\"{{ adrianjuhl__jenkins_on_openshift4__jenkins_source_imagestreamtag_namespace }}\"' | oc apply --filename=- --namespace={{ adrianjuhl__jenkins_on_openshift4__openshift_namespace_jenkins }}"
  changed_when: false
  args:
    stdin: "{{ lookup('file', 'jenkins-DeploymentConfig.yaml') }}"

